<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイアプリ</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI','Hiragino Sans',sans-serif;background:#0f0f1a;color:#e0e0e0;min-height:100vh}
  header{display:flex;justify-content:space-between;align-items:center;padding:24px 32px;background:#16162a;border-bottom:1px solid #2a2a4a}
  header h1{font-size:1.6rem;letter-spacing:.05em}
  header h1 span{color:#7c6fff}
  .header-btns{display:flex;gap:10px}
  .btn{background:#7c6fff;color:#fff;border:none;padding:10px 20px;border-radius:10px;font-size:.95rem;cursor:pointer;transition:background .2s}
  .btn:hover{background:#6a5ce7}
  .btn-sub{background:#2a2a4a}
  .btn-sub:hover{background:#3a3a5a}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;padding:32px}
  .card{background:#1e1e38;border-radius:16px;padding:24px;cursor:pointer;transition:transform .2s,box-shadow .2s;position:relative;text-decoration:none;color:inherit;display:block;border:1px solid #2a2a4a}
  .card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(124,111,255,.2);border-color:#7c6fff}
  .card-icon{font-size:2.8rem;margin-bottom:12px}
  .card-name{font-size:1.15rem;font-weight:600;margin-bottom:6px}
  .card-desc{font-size:.85rem;color:#888;line-height:1.5}
  .card-delete{position:absolute;top:10px;right:10px;background:none;border:none;color:#555;font-size:1.2rem;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s}
  .card-delete:hover{background:#ff4d6a22;color:#ff4d6a}
  .card-edit{position:absolute;top:10px;right:42px;background:none;border:none;color:#555;font-size:1rem;cursor:pointer;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:background .2s,color .2s}
  .card-edit:hover{background:#7c6fff22;color:#7c6fff}
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;align-items:center;justify-content:center}
  .overlay.show{display:flex}
  .modal{background:#1e1e38;border-radius:16px;padding:32px;width:90%;max-width:420px;border:1px solid #2a2a4a}
  .modal h2{margin-bottom:20px;font-size:1.2rem}
  .modal label{display:block;font-size:.85rem;color:#888;margin-bottom:4px;margin-top:14px}
  .modal input,.modal textarea{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #2a2a4a;background:#16162a;color:#e0e0e0;font-size:.95rem;outline:none}
  .modal input:focus,.modal textarea:focus{border-color:#7c6fff}
  .modal textarea{resize:vertical;height:60px}
  .modal-btns{display:flex;gap:10px;margin-top:24px;justify-content:flex-end}
  .modal-btns button{padding:10px 20px;border-radius:10px;border:none;font-size:.9rem;cursor:pointer}
  .btn-cancel{background:#2a2a4a;color:#e0e0e0}
  .btn-cancel:hover{background:#3a3a5a}
  .btn-save{background:#7c6fff;color:#fff}
  .btn-save:hover{background:#6a5ce7}
  .empty{text-align:center;padding:80px 20px;color:#555;font-size:1.1rem}
  .loading{text-align:center;padding:80px 20px;color:#7c6fff;font-size:1.1rem}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#7c6fff;color:#fff;padding:12px 24px;border-radius:10px;font-size:.9rem;z-index:200;opacity:0;transition:opacity .3s;white-space:nowrap}
  .toast.show{opacity:1}
  .sync-indicator{font-size:.75rem;color:#555;padding:4px 12px;text-align:right}
  @media(max-width:600px){
    header{padding:16px 20px;flex-wrap:wrap;gap:10px}
    .grid{padding:20px;gap:14px;grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
    .card{padding:18px}
    .card-icon{font-size:2.2rem}
  }
</style>
</head>
<body>
<header>
  <h1><span>My</span> Apps</h1>
  <div class="header-btns">
    <button class="btn btn-sub" onclick="openModal()">+ 追加</button>
  </div>
</header>
<div id="syncStatus" class="sync-indicator"></div>
<div class="grid" id="grid"><div class="loading">読み込み中...</div></div>
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2 id="modalTitle">アプリを追加</h2>
    <label>アイコン（絵文字）</label>
    <input id="fIcon" placeholder="例: 🎵" maxlength="4">
    <label>アプリ名</label>
    <input id="fName" placeholder="例: ミュージックプレイヤー">
    <label>URL</label>
    <input id="fUrl" placeholder="例: https://example.com">
    <label>説明</label>
    <textarea id="fDesc" placeholder="例: 音楽を再生するアプリ"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" id="btnSave" onclick="saveApp()">追加</button>
    </div>
  </div>
</div>
<script>
const BLOB_ID = '019d8ad1-193c-7d27-acb5-5adbaf6a1a99';
const API_URL = 'https://jsonblob.com/api/jsonBlob/' + BLOB_ID;
let apps = [];
let editingId = null;

// サーバーからアプリ一覧を取得
async function loadApps(){
  try{
    const res = await fetch(API_URL, {headers:{'Accept':'application/json'}});
    if(!res.ok) throw new Error('fetch failed');
    apps = await res.json();
    setSyncStatus('同期済み');
  }catch(e){
    console.error('Load error:', e);
    apps = JSON.parse(localStorage.getItem('myapps_cache')) || [];
    setSyncStatus('オフライン（キャッシュ表示）');
  }
  render();
}

// サーバーに保存 + ローカルキャッシュも更新
async function saveToServer(){
  localStorage.setItem('myapps_cache', JSON.stringify(apps));
  try{
    const res = await fetch(API_URL, {
      method: 'PUT',
      headers: {'Content-Type':'application/json','Accept':'application/json'},
      body: JSON.stringify(apps)
    });
    if(!res.ok) throw new Error('save failed');
    setSyncStatus('保存しました');
  }catch(e){
    console.error('Save error:', e);
    setSyncStatus('保存失敗（ローカルに保存済み）');
  }
}

function setSyncStatus(msg){
  const el = document.getElementById('syncStatus');
  el.textContent = msg;
  setTimeout(()=>{el.textContent='';}, 3000);
}

function nextId(){return apps.length ? Math.max(...apps.map(a=>a.id))+1 : 1}

function render(){
  const grid = document.getElementById('grid');
  if(!apps.length){grid.innerHTML='<div class="empty">アプリがありません。「+ 追加」ボタンから追加してください。</div>';return}
  grid.innerHTML = apps.map(a=>`
    <a class="card" href="${escHtml(a.url)}" target="_blank" rel="noopener" onclick="if(this.href.endsWith('#')){event.preventDefault();alert('URLが未設定です。編集ボタンからURLを設定してください。')}">
      <button class="card-edit" onclick="event.preventDefault();event.stopPropagation();editApp(${a.id})" title="編集">&#9998;</button>
      <button class="card-delete" onclick="event.preventDefault();event.stopPropagation();deleteApp(${a.id})" title="削除">&times;</button>
      <div class="card-icon">${escHtml(a.icon)}</div>
      <div class="card-name">${escHtml(a.name)}</div>
      <div class="card-desc">${escHtml(a.desc)}</div>
    </a>
  `).join('');
}

function escHtml(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}

function openModal(){
  editingId=null;
  document.getElementById('modalTitle').textContent='アプリを追加';
  document.getElementById('btnSave').textContent='追加';
  document.getElementById('fIcon').value='';
  document.getElementById('fName').value='';
  document.getElementById('fUrl').value='';
  document.getElementById('fDesc').value='';
  document.getElementById('overlay').classList.add('show');
}

function editApp(id){
  const app=apps.find(a=>a.id===id);if(!app)return;
  editingId=id;
  document.getElementById('modalTitle').textContent='アプリを編集';
  document.getElementById('btnSave').textContent='保存';
  document.getElementById('fIcon').value=app.icon;
  document.getElementById('fName').value=app.name;
  document.getElementById('fUrl').value=app.url;
  document.getElementById('fDesc').value=app.desc;
  document.getElementById('overlay').classList.add('show');
}

function closeModal(e){
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('show');
}

async function saveApp(){
  const icon=document.getElementById('fIcon').value.trim()||'📱';
  const name=document.getElementById('fName').value.trim();
  const url=document.getElementById('fUrl').value.trim()||'#';
  const desc=document.getElementById('fDesc').value.trim();
  if(!name){alert('アプリ名を入力してください');return}
  if(editingId!==null){
    const app=apps.find(a=>a.id===editingId);
    if(app){app.icon=icon;app.name=name;app.url=url;app.desc=desc}
  }else{
    apps.push({id:nextId(),icon,name,url,desc});
  }
  render();closeModal();
  await saveToServer();
}

async function deleteApp(id){
  if(!confirm('このアプリを削除しますか？'))return;
  apps=apps.filter(a=>a.id!==id);
  render();
  await saveToServer();
}

// 初期読み込み
loadApps();
</script>
</body>
</html>
